<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀 일정</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="styles.css?v=12" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">팀 일정</span>
      </div>
      <div class="month-nav">
        <button class="icon-btn" id="prev-month" aria-label="이전 달">‹</button>
        <button class="month-label" id="month-label">2026년 5월</button>
        <button class="icon-btn" id="next-month" aria-label="다음 달">›</button>
        <button class="text-btn" id="today-btn">오늘</button>
      </div>
    </div>
    <div class="topbar-right">
      <div class="save-status idle" id="save-status" title="자동 저장 상태">
        <span class="save-dot"></span>
        <span class="save-text">대기</span>
      </div>
      <button class="outline-btn" id="manage-categories-btn">카테고리</button>
      <button class="primary-btn" id="add-event-btn">+ 일정 추가</button>
    </div>
  </header>

  <main class="layout">
    <section class="calendar-pane">
      <div class="weekday-row">
        <div class="weekday weekday-sun">일</div>
        <div class="weekday">월</div>
        <div class="weekday">화</div>
        <div class="weekday">수</div>
        <div class="weekday">목</div>
        <div class="weekday">금</div>
        <div class="weekday weekday-sat">토</div>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>

    <aside class="side-pane">
      <div class="side-section">
        <div class="side-section-header">
          <h2 class="side-title" id="memo-title">이달의 메모</h2>
          <span class="side-hint">월별 아젠다·기억할 사항</span>
        </div>
        <textarea
          class="memo-textarea"
          id="memo-textarea"
          placeholder="이번 달 주요 아젠다, 챙겨야 할 일, 컨텍스트 등을 자유롭게 적어주세요."
        ></textarea>
      </div>

      <div class="side-section">
        <div class="side-section-header">
          <h2 class="side-title">이달의 일정</h2>
          <span class="side-hint" id="month-event-count">0건</span>
        </div>
        <div class="event-list" id="event-list"></div>
      </div>

      <div class="side-section">
        <div class="side-section-header">
          <h2 class="side-title">카테고리</h2>
        </div>
        <div class="category-legend" id="category-legend"></div>
      </div>
    </aside>
  </main>

  <!-- 일정 추가/수정 모달 -->
  <div class="modal-backdrop" id="event-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="event-modal-title">일정 추가</h2>
        <button class="icon-btn" id="event-modal-close" aria-label="닫기">×</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span class="field-label">제목</span>
          <input type="text" id="event-title" placeholder="예: v2.21 배포" autocomplete="off" />
        </label>
        <div class="field-row">
          <label class="field">
            <span class="field-label">시작일</span>
            <input type="date" id="event-start" />
          </label>
          <label class="field">
            <span class="field-label">종료일 <span class="field-sub">(선택)</span></span>
            <input type="date" id="event-end" />
          </label>
        </div>
        <label class="field">
          <span class="field-label">카테고리</span>
          <select id="event-category"></select>
        </label>
        <div class="field">
          <span class="field-label">참고 링크 <span class="field-sub">(노션·피그마 등 · 선택)</span></span>
          <div class="links-editor" id="event-links-editor"></div>
          <button class="text-btn link-add-btn" id="event-link-add" type="button">+ 링크 추가</button>
        </div>
        <label class="field">
          <span class="field-label">메모 <span class="field-sub">(선택)</span></span>
          <textarea id="event-note" rows="3" placeholder="세부 사항, 담당자 등"></textarea>
        </label>
      </div>
      <div class="modal-footer">
        <button class="text-btn danger" id="event-delete" hidden>삭제</button>
        <div class="modal-footer-right">
          <button class="outline-btn" id="event-cancel">취소</button>
          <button class="primary-btn" id="event-save">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 날짜별 일정 목록 모달 -->
  <div class="modal-backdrop" id="day-events-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="day-events-title">일정</h2>
        <button class="icon-btn" id="day-events-close" aria-label="닫기">×</button>
      </div>
      <div class="modal-body">
        <div class="day-events-list" id="day-events-list"></div>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-right">
          <button class="primary-btn" id="day-events-add" hidden>+ 새 일정 추가</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 카테고리 관리 모달 -->
  <div class="modal-backdrop" id="category-modal" hidden>
    <div class="modal modal-lg" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title">카테고리 관리</h2>
        <button class="icon-btn" id="category-modal-close" aria-label="닫기">×</button>
      </div>
      <div class="modal-body">
        <p class="modal-desc">이름과 색을 자유롭게 정하세요.</p>
        <div class="category-editor" id="category-editor"></div>
        <button class="outline-btn full" id="category-add">+ 카테고리 추가</button>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-right">
          <button class="outline-btn" id="category-cancel">취소</button>
          <button class="primary-btn" id="category-save">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- GitHub PAT 입력 모달 (편집 시 1회) -->
  <div class="modal-backdrop" id="pat-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title">GitHub 토큰 입력</h2>
        <button class="icon-btn" id="pat-modal-close" aria-label="닫기">×</button>
      </div>
      <div class="modal-body">
        <p class="modal-desc">일정 편집에 처음 1회만 입력하면 이후 자동 저장돼요. <a href="https://github.com/settings/tokens/new?description=team-schedule&scopes=repo" target="_blank" style="color:var(--accent)">여기서 토큰 발급</a> → 권한 <code>repo</code> 체크 → Generate → 복사해서 붙여넣기.</p>
        <label class="field">
          <span class="field-label">Personal Access Token</span>
          <input type="password" id="pat-input" placeholder="토큰 붙여넣기" autocomplete="off" />
        </label>
        <p class="modal-desc" style="font-size:12px;color:var(--text-3);">이 토큰은 이 브라우저 localStorage에만 저장됩니다.</p>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-right">
          <button class="outline-btn" id="pat-cancel">취소</button>
          <button class="primary-btn" id="pat-save">저장</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="app.js?v=12"></script>
</body>
</html>
