name: Save data file

on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'categories.json | manual-events.json | memos.json'
        required: true
      content_b64:
        description: 'base64-encoded JSON content'
        required: true

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pages

      - name: Validate filename (whitelist)
        run: |
          case "${{ inputs.filename }}" in
            categories.json|manual-events.json|memos.json)
              echo "OK: ${{ inputs.filename }}"
              ;;
            *)
              echo "Rejected filename: ${{ inputs.filename }}"
              exit 1
              ;;
          esac

      - name: Decode & write
        run: |
          mkdir -p data
          echo "${{ inputs.content_b64 }}" | base64 -d > "data/${{ inputs.filename }}"
          # Sanity: must be valid JSON
          python3 -c "import json,sys; json.load(open('data/${{ inputs.filename }}', encoding='utf-8'))"

      - name: Commit & push if changed
        run: |
          git config user.name "team-schedule-bot"
          git config user.email "actions@ddapp.io"
          git add "data/${{ inputs.filename }}"
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "갱신: ${{ inputs.filename }} (web)"
            git push
          fi
