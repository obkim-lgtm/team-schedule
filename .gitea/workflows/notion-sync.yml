name: Notion → notion-events.json

on:
  # 매일 9시·12시·18시 KST (00:00 / 03:00 / 09:00 UTC). 평일 스크럼·미팅 직전 갱신.
  schedule:
    - cron: '0 0,3,9 * * *'
  # 수동 트리거 (사이트 헤더의 "동기화" 버튼에서 호출 가능)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_DATE_PROP: ${{ vars.NOTION_DATE_PROP }}
          NOTION_CATEGORY_PROP: ${{ vars.NOTION_CATEGORY_PROP }}
          NOTION_TITLE_PROP: ${{ vars.NOTION_TITLE_PROP }}
          NOTION_DATE_FROM: ${{ vars.NOTION_DATE_FROM }}
        run: node scripts/notion-sync.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "actions@ddapp.io"
          git add data/notion-events.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: refresh notion events ($(date -u '+%Y-%m-%d %H:%MZ'))"
            git push
          fi
